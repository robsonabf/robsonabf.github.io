<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Jogo Monty Hall</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f0f0f0;
    }

    h1 { margin-top: 20px; }

    .portas {
      display: flex;
      justify-content: center;
      margin-top: 40px;
      gap: 20px;
    }

    .porta {
      width: 120px;
      height: 180px;
      background: brown;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      border-radius: 10px;
    }

    .aberta {
      background: gray;
      cursor: default;
    }

    .resultado {
      margin-top: 30px;
      font-size: 20px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Jogo Monty Hall</h1>
  <p>Escolha uma porta</p>

  <div class="portas">
    <div class="porta" data-id="0">1</div>
    <div class="porta" data-id="1">2</div>
    <div class="porta" data-id="2">3</div>
  </div>

  <div class="resultado"></div>

  <button onclick="reiniciar()">Reiniciar</button>

  <script>
    let carro;
    let escolhaInicial = null;
    let portaAberta = null;
    let fase = 1;

    const portas = document.querySelectorAll('.porta');
    const resultado = document.querySelector('.resultado');

    function iniciarJogo() {
      carro = Math.floor(Math.random() * 3);
      escolhaInicial = null;
      portaAberta = null;
      fase = 1;
      resultado.innerText = "Escolha uma porta";

      portas.forEach(p => {
        p.classList.remove('aberta');
        p.innerText = parseInt(p.dataset.id) + 1;
        p.style.pointerEvents = 'auto';
      });
    }

    function abrirPortaCabra() {
      let opcoes = [];
      for (let i = 0; i < 3; i++) {
        if (i !== escolhaInicial && i !== carro) {
          opcoes.push(i);
        }
      }
      portaAberta = opcoes[Math.floor(Math.random() * opcoes.length)];

      portas[portaAberta].classList.add('aberta');
      portas[portaAberta].innerText = '🐐';
    }

    function finalizarJogo(escolhaFinal) {
      portas.forEach((p, i) => {
        p.style.pointerEvents = 'none';
        if (i === carro) {
          p.innerText = '🚗';
        } else if (i !== portaAberta) {
          p.innerText = '🐐';
        }
      });

      if (escolhaFinal === carro) {
        resultado.innerText = "🎉 Você ganhou!";
      } else {
        resultado.innerText = "😢 Você perdeu!";
      }
    }

    portas.forEach(porta => {
      porta.addEventListener('click', () => {
        const id = parseInt(porta.dataset.id);

        if (fase === 1) {
          escolhaInicial = id;
          abrirPortaCabra();
          fase = 2;
          resultado.innerText = "Deseja trocar de porta? Clique em outra porta.";
        }
        else if (fase === 2) {
          if (id === portaAberta) return;
          finalizarJogo(id);
          fase = 3;
        }
      });
    });

    function reiniciar() {
      iniciarJogo();
    }

    iniciarJogo();
  </script>

</body>
</html>
